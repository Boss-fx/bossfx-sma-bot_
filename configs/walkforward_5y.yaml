# BossFx - Phase 3: Walk-forward validation over 5y EURUSD
# Train 24m, test 6m, step 6m, grid of SMA configs x filter on/off.

data:
  source: yfinance
  symbol: EURUSD=X
  timeframe: 1d
  start: 2020-01-01
  end: 2025-01-01
  csv_path: null

strategy:
  name: sma_crossover
  fast_period: 20    # placeholder; walk-forward overrides
  slow_period: 50

risk:
  initial_cash: 10000.0
  risk_per_trade_pct: 0.01
  max_position_pct: 0.20
  stop_loss_pct: 0.010
  take_profit_pct: 0.020

execution:
  spread_pips: 1.0
  slippage_pips: 0.5
  commission_per_lot: 7.0
  pip_size: 0.0001
  contract_size: 100000.0

walkforward:
  train_months: 24
  test_months: 6
  step_months: 6
  fast_periods: [10, 15, 20, 25, 30]
  slow_periods: [40, 50, 75, 100]
  use_trend_filter_options: [false, true]
  trend_filter_periods: [200]

log_level: INFO
