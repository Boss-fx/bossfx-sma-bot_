# BossFx - Phase 2.2: 5-year EURUSD with ONLY the volatility filter
# Used to isolate the vol filter's solo effect.

data:
  source: yfinance
  symbol: EURUSD=X
  timeframe: 1d
  start: 2020-01-01
  end: 2025-01-01
  csv_path: null

strategy:
  name: sma_crossover
  fast_period: 20
  slow_period: 50
  use_trend_filter: false
  use_volatility_filter: true
  volatility_atr_period: 14
  volatility_lookback: 100
  volatility_min_ratio: 0.7
  volatility_max_ratio: 1.5

risk:
  initial_cash: 10000.0
  risk_per_trade_pct: 0.01
  max_position_pct: 0.20
  stop_loss_pct: 0.010
  take_profit_pct: 0.020

execution:
  spread_pips: 1.0
  slippage_pips: 0.5
  commission_per_lot: 7.0
  pip_size: 0.0001
  contract_size: 100000.0

log_level: INFO
